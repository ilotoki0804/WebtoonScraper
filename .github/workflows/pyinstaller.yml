name: Package exe with PyInstaller - Windows

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.11'

    - name: Build PyInstaller
      run: |
        python3.11 -m pip install pyinstaller WebtoonScraper
        pyinstaller -c pyinstaller_build/pyinstaller.py
        tar czf portable.tar.gz dist/pyinstaller

    - uses: actions/upload-artifact@v2
      with:
        name: webtoonscraper-exe
        path: portable.tar.gz
