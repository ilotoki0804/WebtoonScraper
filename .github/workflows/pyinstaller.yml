name: Package exe with PyInstaller - Windows

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  linux-pyinstaller-build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.11'

    - name: Build PyInstaller
      run: |
        python3.11 -m pip install pyinstaller WebtoonScraper
        pyinstaller -c pyinstaller.py

    - uses: actions/upload-artifact@v2
      with:
        name: linux-portable
        path: dist/pyinstaller

  windows-pyinstaller-build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.11'

    - name: Build PyInstaller
      run: |
        py -3.11 -m pip install pyinstaller WebtoonScraper
        pyinstaller -c pyinstaller.py

    - uses: actions/upload-artifact@v2
      with:
        name: windows-portable
        path: dist/pyinstaller

  macos-pyinstaller-build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.11'

    - name: Build PyInstaller
      run: |
        python3.11 -m pip install pyinstaller WebtoonScraper
        pyinstaller -c pyinstaller.py

    - uses: actions/upload-artifact@v2
      with:
        name: macos-portable
        path: dist/pyinstaller
